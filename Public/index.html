<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS — Estado de Resultados 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"></script>
<style>
/* ═══════════ TOKENS ═══════════ */
:root {
  --navy:#0B2545; --blue:#1B4F72; --teal:#0E6B8C; --teal-lt:#E8F4F8;
  --gold:#C9911A; --gold-lt:#FEF6E4;
  --green:#1A7A4A; --green-lt:#E8F5EE;
  --red:#B03A2E; --red-lt:#FDEDEC;
  --orange:#D35400;
  --gray:#F4F6F7; --gray-dk:#7F8C8D;
  --border:#E5E8E8;
  --radius-s:6px; --radius-m:12px; --radius-l:24px;
  --font-title:'DM Serif Display', serif;
  --font-mono:'DM Mono', monospace;
  --font-sans:'Sora', sans-serif;
  --shadow: 0 4px 20px rgba(11,37,69,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans); background: #FAFBFB; color: var(--navy);
  display: flex; height: 100vh; overflow: hidden; font-size: 13px;
}

/* ═══════════ SIDEBAR ═══════════ */
.sidebar {
  width: 260px; background: #FFF; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 24px; justify-content: space-between;
}
.brand h1 { font-family: var(--font-title); font-size: 28px; color: var(--navy); margin-bottom: 4px; }
.brand p { font-size: 11px; color: var(--gray-dk); letter-spacing: 1px; text-transform: uppercase; }

.nav-group { margin-top: 40px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
.nav-btn {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: none; border: none; border-radius: var(--radius-m);
  color: var(--gray-dk); font-family: var(--font-sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; text-align: left;
}
.nav-btn:hover { background: var(--gray); color: var(--navy); }
.nav-btn.active { background: var(--teal-lt); color: var(--teal); font-weight: 600; }

.status-box {
  background: var(--gray); padding: 16px; border-radius: var(--radius-m);
  display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border);
}
.status-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--gray-dk); letter-spacing: 0.5px; }
.status-chip {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius-s);
  font-size: 11px; font-weight: 500;
}
.chip-budget { background: var(--gold-lt); color: var(--gold); }
.chip-real { background: var(--green-lt); color: var(--green); }
.chip-none { background: var(--red-lt); color: var(--red); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ═══════════ MAIN CONTENT ═══════════ */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 70px; background: #FFF; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
}
.view-selector { background: var(--gray); padding: 4px; border-radius: var(--radius-m); display: flex; gap: 4px; }
.vpill {
  padding: 8px 16px; border: none; background: none; font-family: var(--font-sans);
  font-size: 12px; font-weight: 500; border-radius: 8px; cursor: pointer; color: var(--gray-dk);
  transition: all 0.2s ease;
}
.vpill.active { background: #FFF; color: var(--navy); box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-weight: 600; }
.vpill.real-pill.loaded { color: var(--green); }
.vpill.real-pill.loaded.active { background: var(--green-lt); color: var(--green); }

.view-panel { flex: 1; overflow-y: auto; padding: 32px; display: none; }
.view-panel.active { display: block; }

/* ═══════════ GRID & CARDS ═══════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1-tr); gap: 20px; margin-bottom: 24px; }
.kpi-card {
  background: #FFF; padding: 20px; border-radius: var(--radius-m);
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.kpi-label { font-size: 11px; color: var(--gray-dk); font-weight: 500; margin-bottom: 6px; }
.kpi-val { font-family: var(--font-mono); font-size: 20px; font-weight: 500; color: var(--navy); }
.kpi-sub { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

/* ═══════════ TABLES ═══════════ */
.table-container {
  background: #FFF; border-radius: var(--radius-m); border: 1px solid var(--border);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px;
}
table { width: 100%; border-collapse: collapse; text-align: left; }
th {
  background: var(--gray); padding: 14px 20px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; color: var(--navy); letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 12px; }
tr:last-child td { border-bottom: none; }

/* Estilos de filas del ER */
.row-type-H1 { background: var(--teal-lt); font-weight: 700; font-size: 13px; color: var(--teal); }
.row-type-H2 { font-weight: 600; background: #FAFBFB; border-top: 1px solid var(--border); }
.row-type-H3 { font-weight: 600; }
.row-type-DET { color: #566573; padding-left: 32px; font-size: 11.5px; }
.row-type-TOT { font-weight: 700; background: var(--gray); border-top: 2px solid var(--navy); border-bottom: 2px solid var(--navy); }

.neg-val { color: var(--red); font-family: var(--font-mono); }
.pos-val { color: var(--green); font-family: var(--font-mono); }
.neu-val { font-family: var(--font-mono); color: var(--navy); }

/* ═══════════ LAYOUTS ESPECÍFICOS ═══════════ */
.chart-box {
  background: #FFF; padding: 24px; border-radius: var(--radius-m);
  border: 1px solid var(--border); box-shadow: var(--shadow); height: 340px; margin-bottom: 24px;
}
.anal-grid { display: grid; grid-template-columns: 1-fr 1-fr; gap: 24px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <h1>PS</h1>
    <p>Financial Intelligence</p>
  </div>
  
  <div class="nav-group">
    <button class="nav-btn active" onclick="switchTab('tab-er', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      Estado de Resultados
    </button>
    <button class="nav-btn" onclick="switchTab('tab-kpis', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line></svg>
      Indicadores Clave (KPIs)
    </button>
    <button class="nav-btn" onclick="switchTab('tab-anal', this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      Análisis de Margen
    </button>
  </div>

  <div class="status-box">
    <div class="status-title">Fuentes Estatales</div>
    <div id="chipBudget" class="status-chip chip-budget"><div class="dot"></div>Presupuesto Interno</div>
    <div id="chipReal" class="status-chip chip-none"><div class="dot"></div><span id="chipRealTxt">Sin conectar</span></div>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <div style="font-size:16px; font-weight:600; color:var(--navy);">EFS Querétaro 2026</div>
    <div class="view-selector">
      <button class="vpill active" onclick="switchView('budget', this)">Presupuesto</button>
      <button id="btnReal" class="vpill real-pill" onclick="switchView('real', this)">Real Ejecutado</button>
    </div>
  </div>

  <div id="tab-er" class="view-panel active">
    <div class="table-container">
      <table id="table-er-body">
        </table>
    </div>
  </div>

  <div id="tab-kpis" class="view-panel">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">INGRESOS TOTALES</div>
        <div id="kpi-ing" class="kpi-val">$0</div>
        <div id="sub-ing" class="kpi-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">UTILIDAD BRUTA</div>
        <div id="kpi-ub" class="kpi-val">$0</div>
        <div id="sub-ub" class="kpi-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">UTILIDAD OPERATIVA</div>
        <div id="kpi-uo" class="kpi-val">$0</div>
        <div id="sub-uo" class="kpi-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">UTILIDAD NETEADA</div>
        <div id="kpi-un" class="kpi-val">$0</div>
        <div id="sub-un" class="kpi-sub"></div>
      </div>
    </div>
    
    <div class="chart-box">
      <canvas id="chartKPIs"></canvas>
    </div>
  </div>

  <div id="tab-anal" class="view-panel">
    <div class="anal-grid">
      <div class="chart-box" style="height:380px;">
        <canvas id="chartPieIng"></canvas>
      </div>
      <div class="chart-box" style="height:380px;">
        <canvas id="chartPieGto"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// =═════════════════════════════════════════════
//  DATA DEMO EMBEDDED (PRESUPUESTO CONSTANTE)
// =═════════════════════════════════════════════
const budgetData = [
  { "ORDEN":1,  "TIPO":"H1",  "CONCEPTO":"1. INGRESOS", "ENERO":3800000,"FEBRERO":4100000,"MARZO":4600000,"TOTAL":12500000 },
  { "ORDEN":2,  "TIPO":"DET", "CONCEPTO":"Ventas Mayoristas", "ENERO":2500000,"FEBRERO":2700000,"MARZO":3100000,"TOTAL":8300000 },
  { "ORDEN":3,  "TIPO":"DET", "CONCEPTO":"Ventas Minoristas", "ENERO":1100000,"FEBRERO":1200000,"MARZO":1300000,"TOTAL":3600000 },
  { "ORDEN":4,  "TIPO":"DET", "CONCEPTO":"Otros Ingresos", "ENERO":200000, "FEBRERO":200000, "MARZO":200000, "TOTAL":600000 },
  { "ORDEN":5,  "TIPO":"H1",  "CONCEPTO":"2. COSTOS DE VENTAS", "ENERO":-1800000,"FEBRERO":-1950000,"MARZO":-2100000,"TOTAL":-5850000 },
  { "ORDEN":6,  "TIPO":"DET", "CONCEPTO":"Materia Prima", "ENERO":-1200000,"FEBRERO":-1300000,"MARZO":-1400000,"TOTAL":-3900000 },
  { "ORDEN":7,  "TIPO":"DET", "CONCEPTO":"Mano de Obra Directa", "ENERO":-600000, "FEBRERO":-650000, "MARZO":-700000, "TOTAL":-1950000 },
  { "ORDEN":8,  "TIPO":"TOT", "CONCEPTO":"(=) UTILIDAD BRUTA", "ENERO":2000000,"FEBRERO":2150000,"MARZO":2500000,"TOTAL":6650000 },
  { "ORDEN":9,  "TIPO":"H1",  "CONCEPTO":"3. GASTOS OPERATIVOS", "ENERO":-950000,"FEBRERO":-980000,"MARZO":-1020000,"TOTAL":-2950000 },
  { "ORDEN":10, "TIPO":"DET", "CONCEPTO":"Gastos de Administración", "ENERO":-500000,"FEBRERO":-510000,"MARZO":-520000,"TOTAL":-1530000 },
  { "ORDEN":11, "TIPO":"DET", "CONCEPTO":"Gastos de Comercialización", "ENERO":-300000,"FEBRERO":-320000,"MARZO":-340000,"TOTAL":-960000 },
  { "ORDEN":12, "TIPO":"DET", "CONCEPTO":"Amortizaciones & Dep.", "ENERO":-150000,"FEBRERO":-150000,"MARZO":-160000,"TOTAL":-460000 },
  { "ORDEN":13, "TIPO":"TOT", "CONCEPTO":"(=) UTILIDAD OPERATIVA (EBIT)", "ENERO":1050000,"FEBRERO":1170000,"MARZO":1480000,"TOTAL":3700000 },
  { "ORDEN":14, "TIPO":"H2",  "CONCEPTO":"Resultados Financieros", "ENERO":-40000, "FEBRERO":-42000, "MARZO":-38000, "TOTAL":-120000 },
  { "ORDEN":15, "TIPO":"H2",  "CONCEPTO":"Impuestos (ISR)", "ENERO":-300000,"FEBRERO":-330000,"MARZO":-430000,"TOTAL":-1060000 },
  { "ORDEN":16, "TIPO":"TOT", "CONCEPTO":"(=) UTILIDAD NETA", "ENERO":710000, "FEBRERO":798000, "MARZO":1012000,"TOTAL":2520000 }
];

// ESTADOS GLOBALES DE LA APP
let realCSV = null;       // Aquí vivirá el array devuelto por la API Serverless
let viewMode = 'budget';   // 'budget' o 'real'
let chartInstance = null;
let pieIngInstance = null;
let pieGtoInstance = null;

// FORMATEADORES
const fmt = (v) => {
  if (v === undefined || v === null || isNaN(v)) return '-';
  const val = Number(v);
  const str = Math.abs(val).toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return val < 0 ? `(${str})` : str;
};
const fmtCls = (v) => v < 0 ? 'neg-val' : (v > 0 ? 'pos-val' : 'neu-val');

// CONTROL DE CAMBIO DE VISTA (TOPBAR: BUDGET vs REAL)
function switchView(mode, btn) {
  if(mode === 'real' && !realCSV) {
    alert("Los datos reales aún no han sido cargados o sincronizados por la API.");
    return;
  }
  viewMode = mode;
  document.querySelectorAll('.vpill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // Sincronizar re-render en cascada
  renderER();
  renderKPIs();
  renderAnalysis();
}

// CONTROL DE PESTAÑAS (SIDEBAR)
function switchTab(tabId, btn) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');

  if(tabId === 'tab-er') renderER();
  if(tabId === 'tab-kpis') renderKPIs();
  if(tabId === 'tab-anal') renderAnalysis();
}

// OBTENER DATASET ACTIVO
function getActiveData() {
  return viewMode === 'real' && realCSV ? realCSV : budgetData;
}

// ═════════════════════════════════════════════
//  RENDERIZADORES VISUALES
// =═════════════════════════════════════════════

// 1. DIBUJAR TABLA DE ESTADO DE RESULTADOS
function renderER() {
  const data = getActiveData();
  const table = document.getElementById('table-er-body');
  
  let html = `
    <thead>
      <tr>
        <th>Estructura Financiera</th>
        <th style="text-align:right;">Enero 2026</th>
        <th style="text-align:right;">Febrero 2026</th>
        <th style="text-align:right;">Marzo 2026</th>
        <th style="text-align:right;">Acumulado</th>
      </tr>
    </thead>
    <tbody>
  `;
  
  data.forEach(row => {
    const cls = 'row-type-' + (row.TIPO || 'DET');
    html += `
      <tr class="${cls}">
        <td>${row.CONCEPTO}</td>
        <td style="text-align:right;" class="${fmtCls(row.ENERO)}">${fmt(row.ENERO)}</td>
        <td style="text-align:right;" class="${fmtCls(row.FEBRERO)}">${fmt(row.FEBRERO)}</td>
        <td style="text-align:right;" class="${fmtCls(row.MARZO)}">${fmt(row.MARZO)}</td>
        <td style="text-align:right;" class="${fmtCls(row.TOTAL)}">${fmt(row.TOTAL)}</td>
      </tr>
    `;
  });
  
  html += '</tbody>';
  table.innerHTML = html;
}

// 2. RENDEREAR KPIS Y GRAFICA DE BARRAS EVOLUTIVAS
function renderKPIs() {
  if(!document.getElementById('tab-kpis').classList.contains('active')) return;
  const data = getActiveData();

  // Extraer renglones críticos basándose en nombres claves
  const ingRow = data.find(r=>r.CONCEPTO.includes("1. INGRESOS")) || { ENERO:0, FEBRERO:0, MARZO:0, TOTAL:0 };
  const ubRow  = data.find(r=>r.CONCEPTO.includes("UTILIDAD BRUTA")) || { ENERO:0, FEBRERO:0, MARZO:0, TOTAL:0 };
  const uoRow  = data.find(r=>r.CONCEPTO.includes("UTILIDAD OPERATIVA")) || { ENERO:0, FEBRERO:0, MARZO:0, TOTAL:0 };
  const unRow  = data.find(r=>r.CONCEPTO.includes("UTILIDAD NET")) || { ENERO:0, FEBRERO:0, MARZO:0, TOTAL:0 };

  // Pintar Tarjetas de Valor Absoluto Superior
  document.getElementById('kpi-ing').textContent = '$' + fmt(ingRow.TOTAL);
  document.getElementById('kpi-ub').textContent  = '$' + fmt(ubRow.TOTAL);
  document.getElementById('kpi-uo').textContent  = '$' + fmt(uoRow.TOTAL);
  document.getElementById('kpi-un').textContent  = '$' + fmt(unRow.TOTAL);

  // Calcular márgenes porcentuales relativos
  const pctUB = ingRow.TOTAL ? ((ubRow.TOTAL / ingRow.TOTAL) * 100).toFixed(1) : 0;
  const pctUO = ingRow.TOTAL ? ((uoRow.TOTAL / ingRow.TOTAL) * 100).toFixed(1) : 0;
  const pctUN = ingRow.TOTAL ? ((unRow.TOTAL / ingRow.TOTAL) * 100).toFixed(1) : 0;

  document.getElementById('sub-ing').innerHTML = `<span style="color:var(--teal); font-weight:600;">100%</span> del volumen total`;
  document.getElementById('sub-ub').innerHTML  = `Margen Bruto: <span style="font-weight:600; color:var(--green);">${pctUB}%</span>`;
  document.getElementById('sub-uo').innerHTML  = `Margen Op: <span style="font-weight:600; color:var(--navy);">${pctUO}%</span>`;
  document.getElementById('sub-un').innerHTML  = `Margen Neto: <span style="font-weight:600; color:var(--orange);">${pctUN}%</span>`;

  // Inicializar o refrescar Chart.js de evolución mensual
  const ctx = document.getElementById('chartKPIs').getContext('2d');
  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Enero', 'Febrero', 'Marzo'],
      datasets: [
        { label: 'Ingresos', data: [ingRow.ENERO, ingRow.FEBRERO, ingRow.MARZO], backgroundColor: '#1B4F72' },
        { label: 'Utilidad Bruta', data: [ubRow.ENERO, ubRow.FEBRERO, ubRow.MARZO], backgroundColor: '#1A7A4A' },
        { label: 'Utilidad Operativa', data: [uoRow.ENERO, uoRow.FEBRERO, uoRow.MARZO], backgroundColor: '#0E6B8C' },
        { label: 'Utilidad Neta', data: [unRow.ENERO, unRow.FEBRERO, unRow.MARZO], backgroundColor: '#D35400' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { family: 'Sora', size: 11 } } } },
      scales: { y: { ticks: { font: { family: 'DM Mono' } } }, x: { ticks: { font: { family: 'Sora' } } } }
    }
  });
}

// 3. RENDEREAR ANÁLISIS ESTRUCTURAL (PIE CHARTS)
function renderAnalysis() {
  if(!document.getElementById('tab-anal').classList.contains('active')) return;
  const data = getActiveData();

  // Filtrar componentes atómicos (Filas de detalle hijos)
  // Se asume estructura estándar: Ventas... para ingresos; Materia..., Mano..., Gastos... para egresos
  const ingLabels = [], ingValues = [];
  const gtoLabels = [], gtoValues = [];

  data.forEach(r => {
    if(r.TIPO === 'DET') {
      const v = Math.abs(r.TOTAL || 0);
      if(r.CONCEPTO.toLowerCase().includes('venta') || r.CONCEPTO.toLowerCase().includes('otros ingresos')) {
        ingLabels.push(r.CONCEPTO);
        ingValues.push(v);
      } else {
        gtoLabels.push(r.CONCEPTO);
        gtoValues.push(v);
      }
    }
  });

  // Pie 1: Composición de la Facturación
  const ctxIng = document.getElementById('chartPieIng').getContext('2d');
  if(pieIngInstance) pieIngInstance.destroy();
  pieIngInstance = new Chart(ctxIng, {
    type: 'doughnut',
    data: {
      labels: ingLabels,
      datasets: [{ data: ingValues, backgroundColor: ['#0B2545','#1B4F72','#0E6B8C','#C9911A'] }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display:true, text:'Distribución de Ingresos', font:{size:14, family:'Sora'} } }
    }
  });

  // Pie 2: Distribución de Costos y Gastos Absolutos
  const ctxGto = document.getElementById('chartPieGto').getContext('2d');
  if(pieGtoInstance) pieGtoInstance.destroy();
  pieGtoInstance = new Chart(ctxGto, {
    type: 'doughnut',
    data: {
      labels: gtoLabels,
      datasets: [{ data: gtoValues, backgroundColor: ['#B03A2E','#D35400','#7F8C8D','#566573','#95A5A6'] }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display:true, text:'Estructura de Gastos / Costos', font:{size:14, family:'Sora'} } }
    }
  });
}

// =═════════════════════════════════════════════
//  autoLoadReal — CONEXIÓN SEGURA CON LA API SERVERLESS
// =═════════════════════════════════════════════
async function autoLoadReal(){
  const chip    = document.getElementById('chipReal');
  const chipTxt = document.getElementById('chipRealTxt');
  const btnReal = document.getElementById('btnReal');

  // Estado: cargando
  chipTxt.textContent = 'Conectando con API Serverless…';

  try {
    // 1) Llamamos a la ventanilla del servidor en lugar de buscar el archivo Excel
    const resp = await fetch('/api/datos', {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json'
      }
    });

    if(!resp.ok) throw new Error('Error en la API: HTTP ' + resp.status);

    // 2) Recibimos el JSON con los datos ya masticados y calculados por el servidor
    const respuestaServidor = await resp.json();

    // 3) Asignamos los registros procesados al estado de la aplicación
    realCSV  = respuestaServidor.lineasTransacciones; 
    viewMode = 'real';

    // 4) Actualizamos la barra de estado superior
    chip.className     = 'status-chip chip-real';
    chipTxt.textContent = '🔒 Servidor Seguro · Datos Sincronizados';
    btnReal.classList.add('loaded');

    // 5) Re-pintamos los componentes visuales activos
    renderER();
    if(document.getElementById('tab-kpis').classList.contains('active')) renderKPIs();
    if(document.getElementById('tab-anal').classList.contains('active')) renderAnalysis();

  } catch(err){
    console.error('[autoLoadReal] No se pudo conectar con la API:', err);
    chip.className     = 'status-chip chip-none';
    chipTxt.textContent = 'Error de conexión con el Servidor Seguro';
    
    // Fallback: Si el servidor falla, muestra los datos de demostración para que la web no se rompa
    renderER();
  }
}

// Dispara la carga automática al estar listo el DOM
document.addEventListener('DOMContentLoaded', () => {
  // Empezamos mostrando el presupuesto por defecto
  viewMode = 'budget';
  document.querySelectorAll('.vpill').forEach(p=>p.classList.remove('active'));
  const budgetPill = document.querySelector('.vpill');  // primera pestaña = Presupuesto
  if(budgetPill) budgetPill.classList.add('active');
  
  renderER();
  autoLoadReal(); // <--- Llama a nuestra única y segura función
});

// Fallback si DOMContentLoaded ya disparó
if(document.readyState !== 'loading'){ autoLoadReal(); }
</script>
